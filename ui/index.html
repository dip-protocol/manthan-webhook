<!DOCTYPE html>
<html>
<head>
  <title>Manthan UI</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .approve {
      color: green;
      font-weight: bold;
    }

    .reject {
      color: red;
      font-weight: bold;
    }

    .timeline {
      margin-top: 10px;
      padding-left: 10px;
      border-left: 3px solid #ddd;
    }

    .event {
      margin-bottom: 8px;
    }

    small {
      color: #666;
    }
  </style>
</head>

<body>

<h1>🧠 Manthan Decisions</h1>

<div id="list"></div>

<script>
async function load() {
  const res = await fetch("/decisions");
  const data = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  if (!data.results || data.results.length === 0) {
    container.innerHTML = "<p>No decisions found</p>";
    return;
  }

  // 🔥 GROUP BY PR
  const grouped = {};

  data.results.forEach(item => {
    const key = item.pr || "no-pr";

    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(item);
  });

  // 🔥 RENDER GROUPS
  Object.keys(grouped).forEach(pr => {

    const groupDiv = document.createElement("div");
    groupDiv.className = "card";

    const header = document.createElement("h3");
    header.innerText = `PR: ${pr}`;
    groupDiv.appendChild(header);

    const timeline = document.createElement("div");
    timeline.className = "timeline";

    // sort old → new
    grouped[pr].sort(
      (a, b) => new Date(a.created_at) - new Date(b.created_at)
    );

    grouped[pr].forEach(item => {
      const status = item.decisions.some(d => d.decision === "reject")
        ? "reject"
        : "approve";

      const eventDiv = document.createElement("div");
      eventDiv.className = "event";

      eventDiv.innerHTML = `
        → <span class="${status}">${status}</span>
        <small>(${item.created_at})</small>
      `;

      timeline.appendChild(eventDiv);
    });

    groupDiv.appendChild(timeline);
    container.appendChild(groupDiv);
  });
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Manthan UI</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .card { border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 8px; }
    .approve { color: green; }
    .reject { color: red; }
  </style>
</head>
<body>

<h1>🧠 Manthan Decisions</h1>

<div id="list"></div>

<script>
async function load() {
  const res = await fetch("/decisions");
  const data = await res.json();

  const container = document.getElementById("list");

  data.results.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    const status = item.decisions.some(d => d.decision === "reject")
      ? "reject"
      : "approve";

    div.innerHTML = `
      <b>Repo:</b> ${item.repo} <br/>
      <b>PR:</b> ${item.pr} <br/>
      <b>Status:</b> <span class="${status}">${status}</span><br/>
      <b>Time:</b> ${item.created_at}
    `;

    container.appendChild(div);
  });
}

load();
</script>

</body>
</html>

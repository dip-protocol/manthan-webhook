<!DOCTYPE html>
<html>
<head>
  <title>Manthan UI</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .approve {
      color: green;
      font-weight: bold;
    }

    .reject {
      color: red;
      font-weight: bold;
    }

    .timeline {
      margin-top: 10px;
      padding-left: 10px;
      border-left: 3px solid #ddd;
    }

    .event {
      margin-bottom: 10px;
    }

    .reason {
      color: #555;
      font-size: 12px;
    }

    .diff {
      margin: 6px 0 12px 10px;
      font-size: 13px;
      color: #444;
    }

    .graph {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px dashed #ccc;
      font-size: 13px;
    }

    .graph-title {
      font-weight: bold;
      margin-bottom: 5px;
    }

    small {
      color: #666;
    }
  </style>
</head>

<body>

<h1>🧠 Manthan Decisions</h1>

<div id="list"></div>

<script>
async function load() {
  const res = await fetch("/decisions");
  const data = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  if (!data.results || data.results.length === 0) {
    container.innerHTML = "<p>No decisions found</p>";
    return;
  }

  // --- GROUP BY PR ---
  const grouped = {};

  data.results.forEach(item => {
    const key = item.pr || "no-pr";
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(item);
  });

  // --- RENDER ---
  Object.keys(grouped).forEach(pr => {

    const groupDiv = document.createElement("div");
    groupDiv.className = "card";

    const header = document.createElement("h3");
    header.innerText = `PR: ${pr}`;
    groupDiv.appendChild(header);

    const timeline = document.createElement("div");
    timeline.className = "timeline";

    const events = grouped[pr].sort(
      (a, b) => new Date(a.created_at) - new Date(b.created_at)
    );

    let prevDecision = null;

    events.forEach(item => {
      const decisionObj = item.decisions?.[0] || {};
      const status = decisionObj.decision || "unknown";
      const reason = decisionObj.reason || "No reason provided";

      // --- EVENT ---
      const eventDiv = document.createElement("div");
      eventDiv.className = "event";

      eventDiv.innerHTML = `
        → <span class="${status}">${status}</span>
        <small>(${item.created_at})</small><br/>
        <span class="reason">Reason: ${reason}</span>
      `;

      timeline.appendChild(eventDiv);

      // --- DIFF ---
      if (prevDecision && prevDecision !== status) {
        const diffDiv = document.createElement("div");
        diffDiv.className = "diff";

        diffDiv.innerHTML = `
          ⚡ CHANGE: <b>${prevDecision}</b> → <b>${status}</b>
        `;

        timeline.appendChild(diffDiv);
      }

      prevDecision = status;
    });

    groupDiv.appendChild(timeline);

    // --- GRAPH (TRANSITIONS) ---
    const graphDiv = document.createElement("div");
    graphDiv.className = "graph";

    const title = document.createElement("div");
    title.className = "graph-title";
    title.innerText = "Transitions";
    graphDiv.appendChild(title);

    const transitions = {};

    for (let i = 1; i < events.length; i++) {
      const prev = events[i - 1].decisions?.[0]?.decision;
      const curr = events[i].decisions?.[0]?.decision;

      if (!prev || !curr) continue;

      const key = `${prev}->${curr}`;
      transitions[key] = (transitions[key] || 0) + 1;
    }

    Object.keys(transitions).forEach(key => {
      const [from, to] = key.split("->");

      const row = document.createElement("div");

      row.innerHTML = `
        🔗 ${from} → ${to}
        <small>(x${transitions[key]})</small>
      `;

      graphDiv.appendChild(row);
    });

    if (Object.keys(transitions).length > 0) {
      groupDiv.appendChild(graphDiv);
    }

    container.appendChild(groupDiv);
  });
}

load();
</script>

</body>
</html>
